services:
  # Spring Boot Backend Service
  - type: web
    name: medistock-backend
    runtime: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/medistock-backend-0.0.1-SNAPSHOT.jar
    rootDirectory: backend/medistock-backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medistock-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: medistock-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: medistock-db
          property: password

  # React Frontend (Static Site)
  - type: web
    name: medistock-frontend
    runtime: node
    buildCommand: npm run build
    publishPath: dist
    rootDirectory: admin-web
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: medistock-backend
          property: host

databases:
  - name: medistock-db
    databaseName: medistock
    user: postgres
    plan: free
